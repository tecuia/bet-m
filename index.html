<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Футбольная интуиция</title>
    <link href="https://fonts.cdnfonts.com/css/furore" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/helvetica-2" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section id="main-screen" class="screen main-screen">
        <div class="logo-container">
            <img src="imgs/logo.png" alt="Logo" class="logo">
        </div>
        
        <div class="promo-case">
            <h1 class="title">ФУТБОЛЬНАЯ ИНТУИЦИЯ</h1>
            <p class="subtitle">Угадай, что будет дальше и получи бонус от Бет-М</p>
            <button class="btn-start">Начать</button>
        </div>
    </section>

    <section id="rules-screen" class="screen rules-screen hidden">
        <div class="logo-container">
            <img src="imgs/logo.png" alt="Logo" class="logo">
        </div>

        <div class="rules-content">
            <h2 class="rules-title">ПРАВИЛА ИГРЫ</h2>
            
            <div class="rules-container">
                <img src="imgs/rule1.png" alt="Правило 1" class="rule-card">
                <img src="imgs/rule2.png" alt="Правило 2" class="rule-card">
                <img src="imgs/rule3.png" alt="Правило 3" class="rule-card">
            </div>

            <button class="btn-continue">Продолжить</button>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
